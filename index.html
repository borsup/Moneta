<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Moneta – Calculateur de prime</title>
  <meta name="description" content="Calculez instantanément la prime sur l'or et l'argent avant d'acheter. Gratuit, sans pub." />
  <meta name="theme-color" content="#1a1408" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Moneta" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8C97A;
      --gold-dim:    #7a6228;
      --silver:      #A8B8C8;
      --silver-light:#D0DCE8;
      --silver-dim:  #5c7080;
      --bg:          #110F08;
      --bg3:         #252218;
      --surface:     #2A2618;
      --border:      rgba(201,168,76,0.18);
      --text:        #EDE8DA;
      --text-muted:  #8A8470;
      --green:       #4CAF6A;  --green-bg:  rgba(76,175,106,0.12);
      --orange:      #E8943A;  --orange-bg: rgba(232,148,58,0.12);
      --red:         #E85A3A;  --red-bg:    rgba(232,90,58,0.12);
      --blue:        #5AC8E8;  --blue-bg:   rgba(90,200,232,0.12);
      --radius: 14px; --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 16px;
      -webkit-font-smoothing: antialiased; overscroll-behavior: none;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .5;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
    }
    #app {
      position: relative; z-index: 1; max-width: 440px; margin: 0 auto;
      min-height: 100dvh; display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    /* HEADER */
    header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: baseline; gap: 8px; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--gold-light); letter-spacing: .06em; }
    .logo-tag { font-size: 10px; font-weight: 500; letter-spacing: .15em; color: var(--text-muted); text-transform: uppercase; }
    .lang-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--gold);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: .1em;
      padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all .2s;
    }
    .lang-btn:hover { background: var(--bg3); }

    /* SPOT BAR */
    .spot-bar {
      margin: 14px 20px 0; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .spot-prices { flex: 1; display: flex; gap: 20px; }
    .spot-item { display: flex; flex-direction: column; }
    .spot-lbl { font-size: 9px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
    .spot-val { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; line-height: 1; }
    .spot-item.g .spot-val { color: var(--gold-light); }
    .spot-item.s .spot-val { color: var(--silver-light); }
    .spot-val.loading { opacity: .35; }
    .spot-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .spot-src { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; }
    .spot-src.live    { color: var(--green); }
    .spot-src.cached  { color: var(--orange); }
    .spot-src.error   { color: var(--red); }
    .spot-src.manual  { color: var(--text-muted); }
    .refresh-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted); font-size: 14px; flex-shrink: 0; transition: all .2s;
    }
    .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
    .refresh-btn.spin { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* METAL TABS */
    .metal-tabs { display: flex; gap: 10px; padding: 14px 20px 0; }
    .metal-tab {
      flex: 1; padding: 13px 10px; border-radius: var(--radius); border: 1.5px solid transparent;
      background: var(--bg3); cursor: pointer; transition: all .25s; text-align: center;
    }
    .metal-tab .sym { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:700; display:block; line-height:1; }
    .metal-tab .lbl { font-size:10px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; display:block; margin-top:3px; }
    .metal-tab.gold-tab   { --acc: var(--gold);   }
    .metal-tab.silver-tab { --acc: var(--silver);  }
    .metal-tab .sym { color: var(--acc); }
    .metal-tab .lbl { color: var(--text-muted); }
    .metal-tab.active { border-color: var(--acc); background: var(--surface); box-shadow: 0 0 20px -8px var(--acc); }
    .metal-tab.active .lbl { color: var(--acc); }

    /* FINENESS */
    .fineness-wrap { padding: 14px 20px 0; }
    .fineness-title { font-size:10px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
    .fineness-pills { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
    .fp {
      padding:10px 4px; border-radius:var(--radius-sm); border:1.5px solid var(--border);
      background:var(--bg3); text-align:center; line-height:1.3; cursor:pointer; transition:all .2s;
    }
    .fp .fm { display:block; font-size:13px; font-weight:500; color:var(--text); }
    .fp .fs { display:block; font-size:10px; color:var(--text-muted); margin-top:1px; }
    .fp.active { border-color:var(--gold); background:rgba(201,168,76,.1); }
    .fp.active .fm { color:var(--gold-light); }
    .silver-pills .fp.active { border-color:var(--silver); background:rgba(168,184,200,.1); }
    .silver-pills .fp.active .fm { color:var(--silver-light); }

    .fineness-manual { display:flex; align-items:center; gap:8px; }
    .fm-label { font-size:11px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; }
    .fm-wrap { position:relative; flex:1; }
    .fm-wrap input {
      width:100%; background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); padding:9px 32px 9px 12px;
      font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text);
      outline:none; transition:border-color .2s; -webkit-appearance:none;
    }
    .fm-wrap input:focus { border-color:var(--gold); }
    .fm-wrap input::placeholder { color:var(--text-muted); opacity:.4; }
    .fm-wrap input.on { border-color:var(--gold); }
    .silver-mode .fm-wrap input.on { border-color:var(--silver); }
    .fm-unit { position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--text-muted); pointer-events:none; }

    /* CARD */
    .card { margin:14px 20px 0; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
    .card-title { font-size:10px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }

    /* INPUTS */
    .field { margin-bottom:12px; }
    .field:last-child { margin-bottom:0; }
    .field label { display:block; font-size:11px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
    .iw { position:relative; display:flex; align-items:center; }
    .iw input {
      width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-sm);
      padding:12px 48px 12px 14px; font-family:'DM Sans',sans-serif; font-size:16px; color:var(--text);
      outline:none; transition:border-color .2s; -webkit-appearance:none; appearance:none;
    }
    .iw input:focus { border-color:var(--gold); }
    .iw input::placeholder { color:var(--text-muted); opacity:.5; }
    .iw input.api-filled { border-color:rgba(76,175,106,.45); }
    .iu { position:absolute; right:14px; font-size:12px; font-weight:500; color:var(--text-muted); pointer-events:none; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* CALC BTN */
    .calc-btn {
      display:block; width:calc(100% - 40px); margin:14px 20px 0; padding:16px;
      background:linear-gradient(135deg,#C9A84C 0%,#E8C97A 50%,#C9A84C 100%); background-size:200% 100%;
      border:none; border-radius:var(--radius); font-family:'DM Sans',sans-serif;
      font-size:14px; font-weight:500; letter-spacing:.12em; text-transform:uppercase;
      color:#1a1408; cursor:pointer; transition:all .3s;
    }
    .calc-btn:active { transform:scale(.98); }
    .calc-btn:hover  { background-position:100% 0; box-shadow:0 6px 24px -6px rgba(201,168,76,.5); }
    .calc-btn.ag { background:linear-gradient(135deg,#A8B8C8 0%,#D0DCE8 50%,#A8B8C8 100%); }

    /* RESULT */
    .result-card { margin:14px 20px 0; border-radius:var(--radius); padding:20px; border:1.5px solid; display:none; animation:fsl .35s ease; }
    .result-card.vis { display:block; }
    @keyframes fsl { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .result-card.good  { background:var(--green-bg);  border-color:var(--green);  }
    .result-card.ok    { background:var(--orange-bg); border-color:var(--orange); }
    .result-card.high  { background:var(--red-bg);    border-color:var(--red);    }
    .result-card.cheap { background:var(--blue-bg);   border-color:var(--blue);   }
    .rpct { font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:700; line-height:1; text-align:center; }
    .result-card.good  .rpct { color:var(--green); }
    .result-card.ok    .rpct { color:var(--orange); }
    .result-card.high  .rpct { color:var(--red); }
    .result-card.cheap .rpct { color:var(--blue); }
    .rlbl { text-align:center; font-size:13px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; margin-top:6px; }
    .result-card.good  .rlbl { color:var(--green); }
    .result-card.ok    .rlbl { color:var(--orange); }
    .result-card.high  .rlbl { color:var(--red); }
    .result-card.cheap .rlbl { color:var(--blue); }
    .rdet { margin-top:14px; padding-top:12px; border-top:1px solid rgba(255,255,255,.06); display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .di { text-align:center; }
    .dv { font-size:15px; font-weight:500; color:var(--text); display:block; }
    .dl { font-size:10px; font-weight:400; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); display:block; margin-top:2px; }

    /* ERROR / RESET */
    .err { display:none; margin:10px 20px 0; padding:10px 14px; background:rgba(232,90,58,.1); border:1px solid rgba(232,90,58,.3); border-radius:var(--radius-sm); font-size:13px; color:#E88A7A; }
    .err.vis { display:block; }
    .reset-btn { display:none; width:calc(100% - 40px); margin:10px 20px 0; padding:12px; background:transparent; border:1px solid var(--border); border-radius:var(--radius); font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-muted); cursor:pointer; transition:all .2s; letter-spacing:.06em; }
    .reset-btn.vis { display:block; }
    .reset-btn:hover { border-color:var(--gold-dim); color:var(--text); }

    /* LEGEND */
    .legend { margin:14px 20px 0; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .li { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg3); border-radius:var(--radius-sm); border:1px solid var(--border); }
    .ld { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .legend .li:nth-child(1) .ld { background:var(--blue); }
    .legend .li:nth-child(2) .ld { background:var(--green); }
    .legend .li:nth-child(3) .ld { background:var(--orange); }
    .legend .li:nth-child(4) .ld { background:var(--red); }
    .lt { font-size:11px; color:var(--text-muted); line-height:1.3; }
    .lt strong { color:var(--text); font-weight:500; display:block; font-size:12px; }

    footer { margin-top:auto; padding:16px 20px 8px; text-align:center; font-size:11px; color:var(--text-muted); opacity:.4; }

    /* INSTALL BANNER */
    #ibanner { display:none; position:fixed; bottom:20px; left:20px; right:20px; background:var(--surface); border:1px solid var(--gold); border-radius:var(--radius); padding:14px 16px; z-index:100; box-shadow:0 8px 32px rgba(0,0,0,.6); animation:fsl .4s ease; }
    #ibanner.vis { display:flex; align-items:center; gap:12px; }
    .it { flex:1; font-size:13px; color:var(--text); line-height:1.4; }
    .it strong { color:var(--gold-light); }
    .ib { background:var(--gold); color:#1a1408; border:none; border-radius:var(--radius-sm); padding:9px 16px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; }
    .ic { background:none; border:none; color:var(--text-muted); font-size:18px; cursor:pointer; padding:0 0 0 4px; line-height:1; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <span class="logo-name">Moneta</span>
      <span class="logo-tag" id="l-tag">calculateur de prime</span>
    </div>
    <button class="lang-btn" id="l-lang" onclick="toggleLang()">EN</button>
  </header>

  <!-- SPOT BAR -->
  <div class="spot-bar">
    <div class="spot-prices">
      <div class="spot-item g">
        <span class="spot-lbl">Au · €/g</span>
        <span class="spot-val loading" id="sv-gold">—</span>
      </div>
      <div class="spot-item s">
        <span class="spot-lbl">Ag · €/g</span>
        <span class="spot-val loading" id="sv-silver">—</span>
      </div>
    </div>
    <div class="spot-right">
      <span class="spot-src manual" id="spot-src">—</span>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchSpot(true)" title="Actualiser">↻</button>
    </div>
  </div>

  <!-- METAL TABS -->
  <div class="metal-tabs">
    <button class="metal-tab gold-tab active" id="tab-g" onclick="setMetal('gold')">
      <span class="sym">Au</span><span class="lbl" id="l-gold">Or</span>
    </button>
    <button class="metal-tab silver-tab" id="tab-s" onclick="setMetal('silver')">
      <span class="sym">Ag</span><span class="lbl" id="l-silver">Argent</span>
    </button>
  </div>

  <!-- FINENESS -->
  <div class="fineness-wrap">
    <div class="fineness-title" id="l-fin">Titre (fineness)</div>
    <div class="fineness-pills" id="fin-pills"></div>
    <div class="fineness-manual">
      <span class="fm-label" id="l-other">Autre :</span>
      <div class="fm-wrap">
        <input type="number" id="inp-manual-fin" inputmode="decimal"
               placeholder="ex: 750" min="1" max="999" step="1" />
        <span class="fm-unit">‰</span>
      </div>
    </div>
  </div>

  <!-- INPUTS -->
  <div class="card">
    <div class="card-title" id="l-prices">Prix de marché & achat</div>
    <div class="field">
      <label id="l-spot">Cours spot (€/g métal pur)</label>
      <div class="iw">
        <input type="number" id="inp-spot" inputmode="decimal" placeholder="—" step="0.01" min="0" />
        <span class="iu">€/g</span>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label id="l-price">Prix d'achat</label>
        <div class="iw">
          <input type="number" id="inp-price" inputmode="decimal" placeholder="ex: 250" step="0.01" min="0" />
          <span class="iu">€</span>
        </div>
      </div>
      <div class="field">
        <label id="l-weight">Poids</label>
        <div class="iw">
          <input type="number" id="inp-weight" inputmode="decimal" placeholder="ex: 3.1" step="0.001" min="0" />
          <span class="iu">g</span>
        </div>
      </div>
    </div>
  </div>

  <div class="err" id="err-msg"></div>

  <button class="calc-btn" id="calc-btn" onclick="calculate()">
    <span id="l-calc">Calculer la prime</span>
  </button>

  <div class="result-card" id="result-card">
    <div class="rpct" id="r-pct"></div>
    <div class="rlbl" id="r-lbl"></div>
    <div class="rdet">
      <div class="di"><span class="dv" id="r-alloy"></span><span class="dl" id="l-alloy">Cours alliage</span></div>
      <div class="di"><span class="dv" id="r-pgram"></span><span class="dl" id="l-pgram">Prix payé/g</span></div>
    </div>
  </div>

  <button class="reset-btn" id="reset-btn" onclick="doReset()">
    <span id="l-reset">↺ Nouveau calcul</span>
  </button>

  <div class="legend">
    <div class="li"><div class="ld"></div><div class="lt"><strong id="l1">Bon marché</strong><span id="l1b">≤ 0%</span></div></div>
    <div class="li"><div class="ld"></div><div class="lt"><strong id="l2">Bon prix</strong><span id="l2b">0% – 8%</span></div></div>
    <div class="li"><div class="ld"></div><div class="lt"><strong id="l3">Prix correct</strong><span id="l3b">8% – 12%</span></div></div>
    <div class="li"><div class="ld"></div><div class="lt"><strong id="l4">Prix élevé</strong><span id="l4b">&gt; 12%</span></div></div>
  </div>

  <footer>Moneta © 2025 · borsup · <span id="l-free">100% gratuit · sans pub</span></footer>
</div>

<div id="ibanner">
  <div class="it"><strong id="l-ititle">Installer Moneta</strong><br><span id="l-ibody">Ajouter à l'écran d'accueil</span></div>
  <button class="ib" id="install-btn">Installer</button>
  <button class="ic" onclick="document.getElementById('ibanner').classList.remove('vis')">×</button>
</div>

<script>
/* ── CONFIG ──────────────────────────────────────────────────────────────── */
// ⚠️  Remplace par l'URL réelle de ton Cloudflare Worker
// Le Worker doit retourner : { "gold": <EUR/g>, "silver": <EUR/g> }
const WORKER_URL = 'https://moneta-api-proxy.patrick-borsu.workers.dev';

const FALLBACK   = { gold: 125.00, silver: 1.00 };  // EUR/g approximatif
const CACHE_KEY  = 'moneta_spot_v1';
const CACHE_TTL  = 8 * 3600 * 1000; // 8 h

/* ── PURITIES ────────────────────────────────────────────────────────────── */
const PURITIES = {
  gold:   [
    { label:'24K', sub:'999‰', v:0.9999 },
    { label:'22K', sub:'916‰', v:0.9167 },
    { label:'18K', sub:'750‰', v:0.7500 },
    { label:'14K', sub:'585‰', v:0.5833 },
  ],
  silver: [
    { label:'999',     sub:'Fin',      v:0.9990 },
    { label:'925',     sub:'Sterling', v:0.9250 },
    { label:'800',     sub:'Bilon',    v:0.8000 },
    { label:'500',     sub:'Basse',    v:0.5000 },
  ],
};

/* ── TRANSLATIONS ────────────────────────────────────────────────────────── */
const TR = {
  fr:{
    tag:'calculateur de prime', gold:'Or', silver:'Argent',
    fin:'Titre (fineness)', other:'Autre :', prices:'Prix de marché & achat',
    spot:'Cours spot (€/g métal pur)', price:"Prix d'achat", weight:'Poids',
    calc:'Calculer la prime', reset:'↺ Nouveau calcul',
    alloy:'Cours alliage', pgram:'Prix payé / g',
    eFields:'Veuillez remplir tous les champs.',
    eNeg:'Les valeurs doivent être positives.',
    eFin:'Titre invalide (1 – 999 ‰).',
    cheap:'Bon marché', good:'Bon prix', ok:'Prix correct', high:'Prix élevé',
    lb1:'≤ 0%', lb2:'0% – 8%', lb3:'8% – 12%', lb4:'> 12%',
    free:'100% gratuit · sans pub',
    ititle:'Installer Moneta', ibody:"Ajouter à l'écran d'accueil",
    live:'En direct', cached:'En cache', manual:'Saisie manuelle', error:'Indisponible',
    langBtn:'EN',
  },
  en:{
    tag:'premium calculator', gold:'Gold', silver:'Silver',
    fin:'Fineness', other:'Other:', prices:'Market & purchase price',
    spot:'Spot price (€/g pure metal)', price:'Purchase price', weight:'Weight',
    calc:'Calculate premium', reset:'↺ New calculation',
    alloy:'Alloy spot', pgram:'Price paid / g',
    eFields:'Please fill in all fields.',
    eNeg:'Values must be positive.',
    eFin:'Invalid fineness (1 – 999 ‰).',
    cheap:'Bargain', good:'Good price', ok:'Fair price', high:'High price',
    lb1:'≤ 0%', lb2:'0% – 8%', lb3:'8% – 12%', lb4:'> 12%',
    free:'100% free · no ads',
    ititle:'Install Moneta', ibody:'Add to home screen',
    live:'Live', cached:'Cached', manual:'Manual', error:'Unavailable',
    langBtn:'FR',
  },
};

/* ── STATE ───────────────────────────────────────────────────────────────── */
let lang       = 'fr';
let metal      = 'gold';
let selPurity  = PURITIES.gold[0];  // null = manual input
let spotGold   = null;
let spotSilver = null;
let spotSrc    = 'manual';

const t = k => TR[lang][k] || k;

/* ── SPOT FETCH ──────────────────────────────────────────────────────────── */
// Worker retourne { price: <EUR/troy oz> } (goldapi.io appelé avec /XAU/EUR)
// Conversion : EUR/g = EUR/oz ÷ 31.1035

const TROY_OZ = 31.1035;

async function fetchSpot(force = false) {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spin');

  // 1. Vérifier le cache local (8h)
  if (!force) {
    try {
      const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (c && Date.now() - c.ts < CACHE_TTL) {
        applySpot(c.gold, c.silver, 'cached');
        btn.classList.remove('spin');
        return;
      }
    } catch(_) {}
  }

  // 2. Fetch depuis le Worker (2 requêtes parallèles, pas d'AbortSignal)
  try {
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000));
    const fetchJSON = url => fetch(url).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });

    const [dXAU, dXAG] = await Promise.race([
      Promise.all([ fetchJSON(WORKER_URL + '/XAU'), fetchJSON(WORKER_URL + '/XAG') ]),
      timeout,
    ]);

    const eurOzGold   = parseFloat(dXAU.price);
    const eurOzSilver = parseFloat(dXAG.price);

    if (!eurOzGold || !eurOzSilver) throw new Error('Invalid price data');

    // EUR/oz → EUR/g
    const gold   = eurOzGold   / TROY_OZ;
    const silver = eurOzSilver / TROY_OZ;

    localStorage.setItem(CACHE_KEY, JSON.stringify({ gold, silver, ts: Date.now() }));
    applySpot(gold, silver, 'live');

  } catch(e) {
    console.warn('Spot fetch error:', e.message);
    // Fallback : cache périmé → prix hardcodés
    try {
      const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (c) { applySpot(c.gold, c.silver, 'error'); btn.classList.remove('spin'); return; }
    } catch(_) {}
    applySpot(FALLBACK.gold, FALLBACK.silver, 'error');
  } finally {
    btn.classList.remove('spin');
  }
}

function applySpot(g, s, src) {
  spotGold = g; spotSilver = s; spotSrc = src;
  const gEl = document.getElementById('sv-gold');
  const sEl = document.getElementById('sv-silver');
  gEl.textContent = g.toFixed(2); gEl.classList.remove('loading');
  sEl.textContent = s.toFixed(2); sEl.classList.remove('loading');
  const srcEl = document.getElementById('spot-src');
  srcEl.textContent = t(src === 'live' ? 'live' : src === 'cached' ? 'cached' : src === 'error' ? 'error' : 'manual');
  srcEl.className = 'spot-src ' + src;
  fillSpotInput();
}

function fillSpotInput() {
  const inp = document.getElementById('inp-spot');
  if (inp.dataset.override) return;
  const val = metal === 'gold' ? spotGold : spotSilver;
  if (val) { inp.value = val.toFixed(2); inp.classList.add('api-filled'); }
}

/* ── FINENESS RENDER ─────────────────────────────────────────────────────── */
function renderPurities() {
  const container = document.getElementById('fin-pills');
  container.innerHTML = '';
  container.className = 'fineness-pills' + (metal === 'silver' ? ' silver-pills' : '');
  PURITIES[metal].forEach(p => {
    const b = document.createElement('button');
    b.className = 'fp' + (p === selPurity ? ' active' : '');
    b.innerHTML = `<span class="fm">${p.label}</span><span class="fs">${p.sub}</span>`;
    b.onclick = () => {
      selPurity = p;
      document.getElementById('inp-manual-fin').value = '';
      document.getElementById('inp-manual-fin').classList.remove('on');
      renderPurities();
    };
    container.appendChild(b);
  });
  // silver-mode on wrap for manual input styling
  document.querySelector('.fineness-wrap').classList.toggle('silver-mode', metal === 'silver');
}

function getPurity() {
  if (selPurity !== null) return selPurity.v;
  const v = parseFloat(document.getElementById('inp-manual-fin').value);
  return (v >= 1 && v <= 999) ? v / 1000 : null;
}

/* ── METAL SELECT ────────────────────────────────────────────────────────── */
function setMetal(m) {
  metal = m; selPurity = PURITIES[m][0];
  document.getElementById('tab-g').classList.toggle('active', m === 'gold');
  document.getElementById('tab-s').classList.toggle('active', m === 'silver');
  document.getElementById('calc-btn').classList.toggle('ag', m === 'silver');
  document.getElementById('inp-manual-fin').value = '';
  document.getElementById('inp-manual-fin').classList.remove('on');
  // reset spot override for new metal
  const inp = document.getElementById('inp-spot');
  delete inp.dataset.override;
  inp.classList.remove('api-filled');
  fillSpotInput();
  renderPurities();
  hideResult();
}

/* ── LANG ────────────────────────────────────────────────────────────────── */
function toggleLang() { lang = lang === 'fr' ? 'en' : 'fr'; applyLang(); }

function applyLang() {
  const s = (id, k) => { const e = document.getElementById(id); if(e) e.textContent = t(k); };
  s('l-tag','tag'); s('l-gold','gold'); s('l-silver','silver');
  s('l-fin','fin'); s('l-other','other'); s('l-prices','prices');
  s('l-spot','spot'); s('l-price','price'); s('l-weight','weight');
  s('l-calc','calc'); s('l-reset','reset');
  s('l-alloy','alloy'); s('l-pgram','pgram');
  s('l1','cheap'); s('l2','good'); s('l3','ok'); s('l4','high');
  s('l1b','lb1'); s('l2b','lb2'); s('l3b','lb3'); s('l4b','lb4');
  s('l-free','free'); s('l-ititle','ititle'); s('l-ibody','ibody');
  s('l-lang','langBtn');
  const srcEl = document.getElementById('spot-src');
  const map = { live:'live', cached:'cached', manual:'manual', error:'error' };
  if (srcEl) srcEl.textContent = t(map[spotSrc] || 'manual');
  const rc = document.getElementById('result-card');
  if (rc.classList.contains('vis')) {
    const cls = ['cheap','good','ok','high'].find(c => rc.classList.contains(c));
    if (cls) document.getElementById('r-lbl').textContent = t(cls);
  }
}

/* ── CALCULATE ───────────────────────────────────────────────────────────── */
function calculate() {
  const errEl = document.getElementById('err-msg');
  errEl.classList.remove('vis');
  hideResult();

  const pur  = getPurity();
  const spot = parseFloat(document.getElementById('inp-spot').value);
  const px   = parseFloat(document.getElementById('inp-price').value);
  const wt   = parseFloat(document.getElementById('inp-weight').value);

  if (!pur)                              { errEl.textContent = t('eFin');    errEl.classList.add('vis'); return; }
  if (isNaN(spot)||isNaN(px)||isNaN(wt)){ errEl.textContent = t('eFields'); errEl.classList.add('vis'); return; }
  if (spot<=0||px<=0||wt<=0)            { errEl.textContent = t('eNeg');    errEl.classList.add('vis'); return; }

  const spotAlloy  = spot * pur;
  const pricePaidG = px / wt;
  const premium    = ((pricePaidG / spotAlloy) - 1) * 100;

  const cls = premium <= 0 ? 'cheap' : premium <= 8 ? 'good' : premium <= 12 ? 'ok' : 'high';

  const rc = document.getElementById('result-card');
  rc.className = `result-card vis ${cls}`;
  document.getElementById('r-pct').textContent   = (premium >= 0 ? '+' : '') + premium.toFixed(2) + '%';
  document.getElementById('r-lbl').textContent   = t(cls);
  document.getElementById('r-alloy').textContent = spotAlloy.toFixed(3) + ' €/g';
  document.getElementById('r-pgram').textContent = pricePaidG.toFixed(3) + ' €/g';

  document.getElementById('reset-btn').classList.add('vis');
  if (navigator.vibrate) navigator.vibrate(30);
}

function hideResult() {
  document.getElementById('result-card').classList.remove('vis');
  document.getElementById('reset-btn').classList.remove('vis');
}

function doReset() {
  document.getElementById('inp-price').value  = '';
  document.getElementById('inp-weight').value = '';
  document.getElementById('err-msg').classList.remove('vis');
  hideResult();
  document.getElementById('inp-price').focus();
}

/* ── EVENT LISTENERS ─────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  // Enter key
  document.querySelectorAll('input').forEach(i => {
    i.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
  });
  // Spot manual override
  document.getElementById('inp-spot').addEventListener('input', function() {
    this.dataset.override = '1';
    this.classList.remove('api-filled');
  });
  // Manual fineness
  document.getElementById('inp-manual-fin').addEventListener('input', function() {
    const v = parseFloat(this.value);
    if (v >= 1 && v <= 999) {
      selPurity = null;
      this.classList.add('on');
      document.querySelectorAll('.fp').forEach(b => b.classList.remove('active'));
    } else {
      this.classList.remove('on');
    }
  });
});

/* ── PWA INSTALL ─────────────────────────────────────────────────────────── */
let dp;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); dp = e;
  document.getElementById('ibanner').classList.add('vis');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!dp) return;
  dp.prompt(); await dp.userChoice; dp = null;
  document.getElementById('ibanner').classList.remove('vis');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('ibanner').classList.remove('vis');
});

/* ── SERVICE WORKER ──────────────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));
  });
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
renderPurities();
applyLang();
fetchSpot();
</script>
</body>
</html>
